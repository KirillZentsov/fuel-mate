# Alembic configuration file.
#
# The actual database URL is loaded from the DATABASE_URL environment variable
# in alembic/env.py — DO NOT put credentials here.

[alembic]
# Path (relative to alembic.ini) to the migrations directory.
script_location = alembic

# Template for generated revision file names.
# Example output:  alembic/versions/2026_05_07_1430-abc123-add_user_table.py
# We don't actually use `alembic revision --autogenerate` for this project, but
# this template applies if/when new revisions are added by hand.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s-%%(slug)s

# Empty: env.py sets this from os.environ['DATABASE_URL'] at runtime.
sqlalchemy.url =


# ─── Logging ──────────────────────────────────────────────────────────
# Standard Alembic logging setup. INFO level shows which migrations run.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
