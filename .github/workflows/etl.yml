name: ETL pipeline

on:
  schedule:
    # 4 cron-slots cover both BST (UTC+1, summer) and GMT (UTC+0, winter).
    # gov.uk publishes new CSVs ~2× per day; the redundant runs will hit
    # the dedup short-circuit (same sha256) and skip cheaply.
    - cron: '15 9 * * *'    # 09:15 UTC = 10:15 BST / 09:15 GMT
    - cron: '15 10 * * *'   # 10:15 UTC = 11:15 BST / 10:15 GMT
    - cron: '15 15 * * *'   # 15:15 UTC = 16:15 BST / 15:15 GMT
    - cron: '15 16 * * *'   # 16:15 UTC = 17:15 BST / 16:15 GMT
  # Manual trigger via the GitHub Actions UI
  workflow_dispatch: {}

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ETL dependencies
        run: pip install -r requirements-etl.txt

      - name: Run ETL pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          FUEL_FINDER_CLIENT_ID: ${{ secrets.FUEL_FINDER_CLIENT_ID }}
          FUEL_FINDER_CLIENT_SECRET: ${{ secrets.FUEL_FINDER_CLIENT_SECRET }}
          # GITHUB_TOKEN injected automatically by GitHub Actions
        run: python -m etl.pipeline
