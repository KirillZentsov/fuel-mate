name: ETL pipeline


on:
  # Cron disabled while we migrate from CSV download (now WAF-blocked)
  # to the official OAuth API at developer.fuel-finder.service.gov.uk.
  # schedule:
  #   - cron: '15 9 * * *'
  #   - cron: '15 10 * * *'
  #   - cron: '15 15 * * *'
  #   - cron: '15 16 * * *'
  workflow_dispatch: {}

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ETL dependencies
        run: pip install -r requirements-etl.txt

      - name: Run ETL pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          FUEL_PRICES_CSV_URL: ${{ vars.FUEL_PRICES_CSV_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python -m etl.pipeline
